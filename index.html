<main class="feed">
    <!-- This section shows only if they need to log in -->
    <section class="login-prompt">
        <h2>Please log in to Zebra.</h2>
        <p>Join the herd to see your recommended Subgroups.</p>
        
        <div class="auth-buttons">
            <!-- Google Login Button -->
            <button class="btn google" onclick="alert('Connecting to Google...')">
                Log in with Google
            </button>

            <!-- Hotmail/Outlook Login Button -->
            <button class="btn hotmail" onclick="alert('Connecting to Hotmail...')">
                Log in with Hotmail
            </button>
        </div>
    </section>
</main>
