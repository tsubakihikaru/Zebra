<main class="feed">
    <!-- This section shows only if they need to log in -->
    <section class="login-prompt">
        <h2>Please log in to Zebra.</h2>
        <p>Join the herd to see your recommended Subgroups.</p>
        
        <div class="auth-buttons">
            <!-- Google Login Button -->
            <button class="btn google" onclick="alert('Connecting to Google...')">
                Log in with Google
            </button>

            <!-- Hotmail/Outlook Login Button -->
            <button class="btn hotmail" onclick="alert('Connecting to Hotmail...')">
                Log in with Hotmail
            </button>
        </div>
    </section>
</main>
<header>
    <h1>Zebra</h1>
    <div class="user-profile">
        <!-- Click this to see the menu -->
        <button onclick="toggleUserMenu()" class="profile-btn">User Profile</button>
        
        <!-- Hidden by default -->
        <div id="account-menu" class="hidden-menu">
            <button onclick="showAccountSettings()">Your account</button>
        </div>
    </div>
</header>

<!-- This section will be hidden until "Your account" is clicked -->
<div id="account-settings-page" style="display:none;">
    <h2>Account Settings</h2>
    <button class="guest-btn" onclick="activateGuestMode()">Enter Guest Mode</button>
</div>
